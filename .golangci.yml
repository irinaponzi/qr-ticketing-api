version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - misspell

  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-naming
        - name: increment-decrement
        - name: var-naming
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code

    gocritic:
      enabled-checks:
        - dupImport
        - nestingReduce
        - unnecessaryBlock

  exclusions:
    paths:
      - bin
    rules:
      - linters:
          - revive
        path: _test\.go
      - linters:
          - errcheck
        path: _test\.go
      - linters:
          - revive
        text: "stutters"
      - linters:
          - errcheck
        source: "defer .*\\.Close\\(\\)"
      - linters:
          - errcheck
        source: "msg\\.(Ack|Nack)"
      - linters:
          - gocritic
        source: "os\\.Exit"
      - linters:
          - revive
        text: "avoid package names that conflict"
